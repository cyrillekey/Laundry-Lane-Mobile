name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool
            .pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/keys.keystore

      - name: Setup Firebase config for Android
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Setup Firebase config for iOS
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Install dependencies
        run: flutter pub get

      - name: Extract version
        id: version
        run: |
          VERSION_NAME=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "versionName=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "versionCode=${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Setup keystore
        run: |          
          cat <<EOF > android/key.properties
          storeFile=../keys.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF      
      - name: Build APK (split per ABI)
        run: flutter build apk --split-per-abi --release        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.versionName }}+${{ steps.version.outputs.versionCode }}
          name: Release v${{ steps.version.outputs.versionName }} (build ${{ steps.version.outputs.versionCode }})
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          body: |
            ## Release v${{ steps.version.outputs.versionName }} (build ${{ steps.version.outputs.versionCode }})

            Automated release from `main` branch.

            ### APKs
            | ABI | File |
            |---|---|
            | arm64-v8a (64-bit ARM) | `app-arm64-v8a-release.apk` |
            | armeabi-v7a (32-bit ARM) | `app-armeabi-v7a-release.apk` |
            | x86_64 (64-bit x86) | `app-x86_64-release.apk` |
          draft: false
          prerelease: false
